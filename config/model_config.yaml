# Model Configuration - Token budgets, model selection, scaling parameters
# Supports env var overrides: SECURITY_AGENT_DETECTOR_TOKENS=26000, etc.
# Version: 1.0

models:
  detector:
    model_name: "Qwen/Qwen2.5-Coder-7B-Instruct"
    max_tokens: 26000
    output_reserve: 2000
    safety_margin: 0.90
    temperature: 0.1
    description: "Detector for A05, A02, A10 vulnerabilities - pattern-heavy analysis"
  
  prosecutor:
    model_name: "Qwen/Qwen2.5-Coder-7B-Instruct"
    max_tokens: 20000
    output_reserve: 1500
    safety_margin: 0.90
    temperature: 0.1
    description: "Red team perspective - argues findings ARE exploitable"
  
  defender:
    model_name: "Qwen/Qwen2.5-Coder-7B-Instruct"
    max_tokens: 20000
    output_reserve: 1500
    safety_margin: 0.90
    temperature: 0.1
    description: "Devil's advocate - argues findings may be false positives"
  
  judge:
    model_name: "Qwen/Qwen2.5-Coder-32B-Instruct"
    max_tokens: 28000
    output_reserve: 2000
    safety_margin: 0.90
    temperature: 0.0
    description: "Final decision maker - synthesizes prosecutor/defender scores"

tokenization:
  encoder: "cl100k_base"
  description: "tiktoken encoder - matches HuggingFace API token counting"

retry_policy:
  max_attempts: 3
  backoff_multiplier: 2
  initial_delay: 2
  description: "Exponential backoff for rate limit errors (2s, 4s, 8s)"

chunking:
  enabled: true
  max_chunk_tokens: 24000
  min_chunk_tokens: 5000
  overlap_tokens: 500
  strategy: "semantic"
  description: "Semantic chunking by file boundaries with token overlap for context"

constants:
  huggingface_api_max_tokens: 32768
  detector_safety_margin_tokens: 23400
  prosecutor_safety_margin_tokens: 18000
  defender_safety_margin_tokens: 18000
  judge_safety_margin_tokens: 25200
